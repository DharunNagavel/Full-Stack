<!doctype html>
<html ng-app="todoApp">
  <head>
    <meta charset="UTF-8" />
    <title>AngularJS To-Do List</title>
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
      body {
        background-color: #f8f9fa;
      }
      .completed {
        text-decoration: line-through;
        color: gray;
      }
      .card {
        margin-top: 50px;
      }
    </style>
  </head>
  <body ng-controller="todoController">
    <div class="container">
      <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
          <h3>📝 AngularJS To-Do List</h3>
        </div>
        <div class="card-body">
          <div class="input-group mb-3">
            <input
              type="text"
              class="form-control"
              placeholder="Enter new task"
              ng-model="newTask"
              ng-keypress="($event.which === 13) && addTask()"
            />
            <div class="input-group-append">
              <button class="btn btn-success" ng-click="addTask()">Add</button>
            </div>
          </div>
          <ul class="list-group">
            <li
              class="list-group-item d-flex justify-content-between align-items-center"
              ng-repeat="task in tasks"
            >
              <div>
                <input type="checkbox" ng-model="task.completed" class="mr-2" />
                <span ng-class="{'completed': task.completed}">
                  {{task.name}}
                </span>
              </div>
              <button
                class="btn btn-danger btn-sm"
                ng-click="deleteTask($index)"
              >
                Delete
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <script>
      var app = angular.module("todoApp", []);
      app.controller("todoController", function ($scope) {
        $scope.tasks = [];
        $scope.addTask = function () {
          if ($scope.newTask && $scope.newTask.trim() !== "") {
            $scope.tasks.push({
              name: $scope.newTask,
              completed: false,
            });
            $scope.newTask = "";
          }
        };
        $scope.deleteTask = function (index) {
          $scope.tasks.splice(index, 1);
        };
      });
    </script>
  </body>
</html>
