<!doctype html>
<html>
  <head>
    <title>Student Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  </head>
  <body class="container mt-5">
    <h2>Student Management System</h2>
    <input id="name" placeholder="Name" class="form-control mb-2" />
    <input id="dept" placeholder="Department" class="form-control mb-2" />
    <input id="year" placeholder="Year" class="form-control mb-2" />
    <button onclick="addStudent()" class="btn btn-primary">Add Student</button>
    <hr />
    <h3>Student List</h3>
    <ul id="list"></ul>
    <script>
      async function addStudent() {
        const student = {
          name: document.getElementById("name").value,
          department: document.getElementById("dept").value,
          year: document.getElementById("year").value,
        };
        await fetch("/students", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(student),
        });
        loadStudents();
      }
      async function loadStudents() {
        const res = await fetch("/students");
        const data = await res.json();
        const list = document.getElementById("list");
        list.innerHTML = "";
        data.forEach((s) => {
          const li = document.createElement("li");
          li.innerHTML = `${s.name} - ${s.department} - Year ${s.year}
          <button onclick="deleteStudent('${s._id}')">Delete</button>`;
          list.appendChild(li);
        });
      }
      async function deleteStudent(id) {
        await fetch("/students/" + id, {
          method: "DELETE",
        });
        loadStudents();
      }
      loadStudents();
    </script>
  </body>
</html>
